# Production deployment that pulls the image built by GitHub Actions.
#
#   1. cp .env.example .env      # then fill in your DeepSeek key
#   2. docker compose -f docker-compose.ghcr.yml pull
#   3. docker compose -f docker-compose.ghcr.yml up -d
#   4. open http://<server-ip>:3210

services:
  atelier:
    image: ghcr.io/2guan/liquid:latest
    container_name: liquid-atelier
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3210}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
